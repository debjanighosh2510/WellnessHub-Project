<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signup</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      max-width: 400px; 
      margin: 50px auto; 
    }
    form { 
      display: flex; 
      flex-direction: column; 
    }
    input { 
      margin: 8px 0; 
      padding: 10px; 
    }
    button { 
      padding: 10px; 
      background: #4CAF50; 
      color: white; 
      border: none; 
      cursor: pointer; 
    }
    button:hover { 
      background: #45a049; 
    }
    .redirect {
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
    }
    .redirect a {
      color: #4CAF50;
      text-decoration: none;
      font-weight: bold;
    }
    .redirect a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h2>Signup</h2>
  <form id="signupForm">
    <input type="text" id="name" placeholder="Full Name" required />
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />
    <input type="text" id="address" placeholder="Address" required />
    <button type="submit">Signup</button>
  </form>

  <div class="redirect">
    Already a user? <a href="login.html">Login</a>
  </div>

  <script>
    document.getElementById("signupForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const res = await fetch("http://localhost:5000/api/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name: document.getElementById("name").value,
          email: document.getElementById("email").value,
          password: document.getElementById("password").value,
          address: document.getElementById("address").value
        })
      });

      if (res.ok) {
        const data = await res.json();
        localStorage.setItem("user", JSON.stringify(data.user)); // Save user details
        localStorage.setItem("token", data.token); // Save token too
        window.location.href = "home.html"; // Redirect directly to home
      } else {
        const err = await res.json();
        alert("Signup failed! " + (err.error || ""));
      }
    });
  </script>
</body>
</html>
