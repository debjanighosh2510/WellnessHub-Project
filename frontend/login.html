<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WellnessHub — Login</title>
  <style>
    body { font-family: Arial, sans-serif; max-width:420px; margin:40px auto; padding:16px; }
    input { width:100%; padding:8px; margin:8px 0; box-sizing:border-box; }
    button { padding:10px 16px; }
    #message { margin-top:12px; color:#b33; white-space:pre-wrap; }
  </style>
</head>
<body>
  <h2>Login to WellnessHub</h2>

  <form id="loginForm">
    <input type="email" id="email" placeholder="Email" required />
    <input type="password" id="password" placeholder="Password" required />
    <button type="submit">Login</button>
  </form>

  <p id="message"></p>

  <script>
    // Make sure your backend (node server) is running on http://localhost:5000
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      document.getElementById("message").innerText = "Logging in...";

      try {
        const res = await fetch("http://localhost:5000/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          document.getElementById("message").innerText = data.error || "Login failed";
          return;
        }

        // Save token and simple user info
        localStorage.setItem("token", data.token);
        localStorage.setItem("user", JSON.stringify(data.user || {}));
        document.getElementById("message").innerText = "Login successful — redirecting...";
        // Open profile page next (we'll create it in Step 2)
        setTimeout(() => { window.location.href = "profile.html"; }, 800);
      } catch (err) {
        document.getElementById("message").innerText = "Network error: " + err.message;
      }
    });

    // Optional: prefill with test account (change if you used different credentials)
    // document.getElementById("email").value = "john@example.com";
    // document.getElementById("password").value = "mypassword123";
  </script>
</body>
</html>
